        body {

        <form style="text-align: center; margin: 20px;">

            <input type="number" id="input1" placeholder="Enter °C Value" style="width: 100%; max-width: 300px; padding: 10px; margin: 10px;"><br>

            <input type="button" onclick="hic()" value="Enter" style="width: 100%; max-width: 300px; padding: 10px; margin: 10px; background-color: #f9d5c7; border: none; color: black; font-size: 16px; cursor: pointer;">
